services:
  ocr:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
      - model_cache:/root/.cache
    working_dir: /app
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          memory: 8g
    ports:
      - "8888:8888"
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    command: >
      jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root

volumes:
  model_cache:
